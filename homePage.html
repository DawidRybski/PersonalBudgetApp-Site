<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="py-3"> 
        <div class="container-fluid header-container d-flex align-items-center justify-content-between"> 
            <div class="logo">
                <img src="assets/images/piggy-bank-icon.svg" height="25px"/>
                <h1 class="h6">Budget <br>Manager</h1>   
            </div> 
            <nav class="site-nav navbar-expand-md">
                <button class="open-menu" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRight" aria-controls="offcanvasRight">
                    <img src="assets/images/navbar/menu.svg" alt="Open mobile menu">
                </button>
                <div class="offcanvas offcanvas-end offcanvas-md" tabindex="-1" id="offcanvasRight" aria-labelledby="offcanvasRightLabel">
                    <div class="offcanvas-header">
                        <div class="logo">
                            <img src="assets/images/piggy-bank-icon.svg" height="25px"/>
                            <p class="h6">Budget <br>Manager</p>   
                        </div> 
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <ul class="nav-menu">
                            <li class="nav-item">
                                <a class="navbar-button" href="#">
                                    <img src="assets/images/navbar/dollar-sign.svg" height="16px"/>
                                    <span>Add Income</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="navbar-button" href="addExpense.html">
                                    <img src="assets/images/navbar/shopping-cart.svg" height="16px"/>
                                    <span>Add Expense</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="navbar-button" href="#">
                                    <img src="assets/images/navbar/pie-chart.svg" height="16px"/>
                                    <span>View Balance</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="navbar-button" href="#">
                                    <img src="assets/images/navbar/settings.svg" height="16px"/>
                                    <span>Settings</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="navbar-button" href="index.html">
                                    <img src="assets/images/navbar/log-out.svg" height="16px"/>
                                    <span>Log out</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>    
        </div> 
    </header>
    <div class="user-bar">
        <div class="container-fluid header-container">
            <div class="user-bar-text mt-1">
                <img src="assets/images/forms/person-icon.svg" alt="User icon">
                <span>User: <strong>Dawid</strong></span>
            </div>
        </div>
    </div>
    <main>
        <section class="menu m-3">
            <img class="menu_img" src="assets/images/wallet.svg" alt=""/>
            <div class="container menu-card">
                <h1 class="h4">Hello <span>Dawid</span>!</h1>
                <p>What do you want to do?</p>
                <div class="homePage-menu">
                    <a class="menu-button p-3" data-tone="income" href="#">
                        <img src="assets/images/menu/dollar-sign.svg" height="40px"/>
                        <span>Add Income</span>
                    </a>
                    <a class="menu-button p-3" data-tone="expense" href="addExpense.html">
                        <img src="assets/images/menu/shopping-cart.svg" height="40px"/>
                        <span>Add Expense</span>
                    </a>
                    <a class="menu-button p-3" data-tone="balance" href="#">
                        <img src="assets/images/menu/pie-chart.svg" height="40px"/>
                        <span>View Balance</span>
                    </a>
                    <a class="menu-button p-3" data-tone="settings" href="#">
                        <img src="assets/images/menu/settings.svg" height="40px"/>
                        <span>Settings</span>
                    </a>
                </div>
                <a class="button-outline p-2" data-tone="logout" href="index.html">
                        <img src="assets/images/menu/log-out.svg" height="16px"/>
                        <span>Log out</span>
                </a>
            </div>
        </section>
    </main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>    
</body>
</html>
