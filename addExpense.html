<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="py-3">
        <div class="container-fluid header-container d-flex align-items-center justify-content-between">
            <a href="homePage.html" class="logo">
                <img src="assets/images/piggy-bank-icon.svg" height="25px"/>
                <h1 class="h6">Budget <br>Manager</h1>   
            </a>
            <nav class="site-nav navbar-expand-md">
                <button class="open-menu" data-bs-toggle="offcanvas" data-bs-target="#offcanvasRight" aria-controls="offcanvasRight">
                    <img src="assets/images/navbar/menu.svg" alt="Open mobile menu">
                </button>
                <div class="offcanvas offcanvas-end offcanvas-md" tabindex="-1" id="offcanvasRight" aria-labelledby="offcanvasRightLabel">
                    <div class="offcanvas-header">
                        <div class="logo">
                            <img src="assets/images/piggy-bank-icon.svg" height="25px"/>
                            <p class="h6">Budget <br>Manager</p>   
                        </div> 
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                    </div>
                    <div class="offcanvas-body">
                        <ul class="nav-menu">
                            <li class="nav-item">
                                <a class="navbar-button" href="#">
                                    <img src="assets/images/navbar/dollar-sign.svg" height="16px"/>
                                    <span>Add Income</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="navbar-button active" href="#">
                                    <img src="assets/images/navbar/shopping-cart.svg" height="16px"/>
                                    <span>Add Expense</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="navbar-button" href="viewBalance.html">
                                    <img src="assets/images/navbar/pie-chart.svg" height="16px"/>
                                    <span>View Balance</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="navbar-button" href="#">
                                    <img src="assets/images/navbar/settings.svg" height="16px"/>
                                    <span>Settings</span>
                                </a>
                            </li>
                            <li class="nav-item">
                                <a class="navbar-button" href="index.html">
                                    <img src="assets/images/navbar/log-out.svg" height="16px"/>
                                    <span>Log out</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav> 
        </div>
    </header>
    <div class="user-bar">
        <div class="container-fluid header-container">
            <div class="user-bar-text mt-1">
                <img src="assets/images/forms/person-icon.svg" alt="User icon">
                <span>User: <strong>Dawid</strong></span>
            </div>
        </div>
    </div>
    <main class="container">
        <div class="add-expense-section" >
    <main class="container main-centered">
        <section class="add-expense-section" >
            <h2 id="formTitle" class="form-header h4">Adding new expense</h2> 
            <div class="form-card"> 
                <div class="description">
                    <p>Enter data for new expense</p>
                </div>
                <form aria-labelledby="formTitle" novalidate>
                    <div class="fields">
                        <div class="container field-control">
                            <div class="row input-wrapper">
                                <span class="col-2 input-symbol">
                                    <img src="assets/images/forms/dollar-sign.svg" alt="" aria-hidden="true"/>
                                </span>
                                <label for="amount" class="visually-hidden">Amount</label>
                                <input id="amount" name="amount" class="col field" type="number" placeholder="Amount" autocomplete="amount" inputmode="decimal" required>
                                <img class="error-icon" src="assets/images/forms/validate-icon.svg" alt="" aria-hidden="true"/>
                            </div>
                        </div>
                        <div class="container field-control">
                            <div class="row input-wrapper">
                                <span class="col-2 input-symbol">
                                    <img src="assets/images/forms/calendar.svg" alt="" aria-hidden="true"/>
                                </span>
                                <label for="expenseDate" class="visually-hidden">Date</label>
                                <input id="expenseDate" name="date" class="col field" type="date" value="2026-03-12" required>
                            </div>
                        </div>
                        <div class="container field-control">
                            <div class="row input-wrapper">
                                <span class="col-2 input-symbol">
                                    <img src="assets/images/forms/credit-card.svg" alt="" aria-hidden="true"/>
                                </span>
                                <label for="paymentMethod" class="visually-hidden">Payment method</label>
                                <select id="paymentMethod" name="paymentMethod" class="col field select-field" required>
                                        <option value="" selected disabled hidden>Payment method</option>
                                        <option class="dropdown-item">Cash</option>
                                        <option class="dropdown-item">Credit card</option>
                                        <option class="dropdown-item">Debit card</option>
                                </select>
                            </div>
                        </div>
                        <div class="container field-control">
                            <div class="row input-wrapper">
                                <span class="col-2 input-symbol">
                                    <img src="assets/images/forms/layers.svg" alt="" aria-hidden="true"/>
                                </span>
                                <label for="category" class="visually-hidden">Category</label>
                                <select id="category" name="category" class="col field select-field" required>
                                    <option value="" selected disabled hidden>Category</option>
                                    <option value="food">Food</option>
                                    <option value="apartment">Apartment</option>
                                    <option value="transport">Transport</option>
                                    <option value="telecommunication">Telecommunication</option>
                                    <option value="healthcare">Healthcare</option>
                                    <option value="clothes">Clothes</option>
                                    <option value="hygiene">Hygiene</option>
                                    <option value="children">Children</option>
                                    <option value="recreation">Recreation</option>
                                    <option value="trips">Trips</option>
                                    <option value="learning">Learning</option>
                                    <option value="books">Books</option>
                                    <option value="savings">Savings</option>
                                    <option value="retirement">Retirement</option>
                                    <option value="debt-repayment">Debt repayment</option>
                                    <option value="donation">Donation</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="container field-control">
                            <div class="row input-wrapper">
                                <span class="col-2 input-symbol">
                                    <img src="assets/images/forms/message-square.svg" alt="" aria-hidden="true"/>
                                </span>
                                <label for="comment" class="visually-hidden">Comment</label>
                                <input id="comment" name="comment" class="col field" type="text" placeholder="Comment" autocomplete="amount" required>
                                <img class="error-icon" src="assets/images/forms/validate-icon.svg" alt="" aria-hidden="true"/>
                            </div>
                        </div>
                        <button class="button-primary submit addExpense" type="submit">Add expense</button>
                        <a class="button-outline" href="homePage.html">Cancel</a>
                    </div>
                </form>
            </div>
        </section> 
    </main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="index.js" charset="UTF-8"></script>
</body>
</html>
